<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Trắc Nghiệm Nhập Môn Web</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
  .option, .btn, .back-btn, .exam-card, .btn-restart, .btn-home { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }

  /* HOME */
  #home { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 30px; }
  #home h1 { font-size: 2rem; color: #f0c040; text-align: center; margin-bottom: 10px; }
  #home p { color: #aaa; margin-bottom: 40px; text-align: center; }
  .exam-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; width: 100%; max-width: 900px; }
  .exam-card { background: #16213e; border: 2px solid #0f3460; border-radius: 16px; padding: 30px 20px; text-align: center; cursor: pointer; transition: all 0.3s; }
  .exam-card:hover { border-color: #f0c040; transform: translateY(-4px); box-shadow: 0 8px 24px rgba(240,192,64,0.2); }
  .exam-card .icon { font-size: 2.5rem; margin-bottom: 12px; }
  .exam-card h2 { color: #f0c040; font-size: 1.2rem; margin-bottom: 6px; }
  .exam-card span { color: #aaa; font-size: 0.9rem; }

  /* QUIZ */
  #quiz { display: none; max-width: 820px; margin: 0 auto; padding: 24px 16px; }
  .quiz-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .back-btn { background: #16213e; border: 1px solid #0f3460; color: #aaa; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
  .back-btn:hover { color: #f0c040; border-color: #f0c040; }
  .quiz-title { color: #f0c040; font-size: 1.3rem; font-weight: bold; }
  .quiz-meta { margin-left: auto; color: #aaa; font-size: 0.9rem; }

  .progress-bar { height: 6px; background: #0f3460; border-radius: 99px; margin-bottom: 28px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #f0c040, #e07b00); border-radius: 99px; transition: width 0.4s; }

  .question-card { background: #16213e; border-radius: 16px; padding: 28px; border: 1px solid #0f3460; margin-bottom: 24px; }
  .question-num { font-size: 0.8rem; color: #888; margin-bottom: 8px; }
  .question-text { font-size: 1.05rem; line-height: 1.6; margin-bottom: 22px; color: #e8e8e8; }
  .question-text code { background: #0d1b2a; padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 0.9em; color: #7dd3fc; }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .option { display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px; border-radius: 10px; cursor: pointer; border: 2px solid #0f3460; background: #0d1b2a; transition: all 0.2s; }
  .option:hover:not(.disabled) { border-color: #4a9eff; background: #132034; }
  .option .opt-label { width: 28px; height: 28px; min-width: 28px; border-radius: 50%; border: 2px solid #4a9eff; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; color: #4a9eff; flex-shrink: 0; margin-top: 1px; }
  .option .opt-text { flex: 1; line-height: 1.5; font-size: 0.95rem; }
  .option.selected { border-color: #4a9eff; background: #0e2a44; }
  .option.correct { border-color: #22c55e !important; background: #052e16 !important; }
  .option.correct .opt-label { border-color: #22c55e; color: #22c55e; }
  .option.correct .opt-text { color: #f0c040 !important; font-weight: bold !important; }
  .option.wrong { border-color: #ef4444 !important; background: #2d0a0a !important; }
  .option.wrong .opt-label { border-color: #ef4444; color: #ef4444; }
  .option.disabled { cursor: default; }
  .option.hint-correct { border-color: #f0c040 !important; background: #2a1f00 !important; }
  .option.hint-correct .opt-label { border-color: #f0c040; color: #f0c040; }
  .option.hint-correct .opt-text { color: #f0c040 !important; font-weight: bold !important; }

  .card-actions { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
  .btn { padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: all 0.2s; }
  .btn-hint { background: #1e293b; color: #f0c040; border: 2px solid #f0c040; }
  .btn-hint:hover { background: #2a1f00; }
  .btn-next { background: #f0c040; color: #1a1a2e; margin-left: auto; }
  .btn-next:hover { background: #ffd966; }
  .btn-next:disabled { opacity: 0.4; cursor: not-allowed; }

  /* RESULT */
  #result { display: none; max-width: 700px; margin: 0 auto; padding: 40px 16px; text-align: center; }
  .result-circle { width: 150px; height: 150px; border-radius: 50%; border: 6px solid #f0c040; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 30px; }
  .result-score { font-size: 2.8rem; font-weight: bold; color: #f0c040; }
  .result-label { font-size: 0.9rem; color: #aaa; }
  .result-title { font-size: 1.5rem; color: #f0c040; margin-bottom: 8px; }
  .result-sub { color: #888; margin-bottom: 32px; }
  .result-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 36px; }
  .stat-box { background: #16213e; border-radius: 12px; padding: 16px; border: 1px solid #0f3460; }
  .stat-box .num { font-size: 1.6rem; font-weight: bold; color: #f0c040; }
  .stat-box .lbl { font-size: 0.8rem; color: #888; }
  .result-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn-restart { background: #f0c040; color: #1a1a2e; padding: 12px 28px; border-radius: 12px; border: none; cursor: pointer; font-size: 1rem; font-weight: bold; }
  .btn-restart:hover { background: #ffd966; }
  .btn-home { background: #16213e; color: #f0c040; padding: 12px 28px; border-radius: 12px; border: 2px solid #f0c040; cursor: pointer; font-size: 1rem; font-weight: bold; }
  .btn-home:hover { background: #2a1f00; }

  .feedback { margin-top: 12px; font-size: 0.9rem; padding: 8px 12px; border-radius: 8px; }
  .feedback.correct-msg { background: #052e16; color: #4ade80; border: 1px solid #22c55e; }
  .feedback.wrong-msg { background: #2d0a0a; color: #f87171; border: 1px solid #ef4444; }

  /* ===== MOBILE (≤600px) ===== */
  @media (max-width: 600px) {
    #home { padding: 24px 16px; }
    #home h1 { font-size: 1.6rem; }
    #home p { margin-bottom: 28px; font-size: 0.9rem; }
    .exam-grid { grid-template-columns: 1fr; gap: 14px; }
    .exam-card { padding: 22px 18px; }

    #quiz { padding: 16px 12px; }
    .quiz-header { gap: 8px; }
    .back-btn { padding: 10px 14px; font-size: 0.85rem; }
    .quiz-title { font-size: 1.05rem; }
    .quiz-meta { width: 100%; margin-left: 0; text-align: right; font-size: 0.85rem; }

    .question-card { padding: 18px 16px; border-radius: 12px; }
    .question-text { font-size: 0.95rem; margin-bottom: 18px; }
    .option { padding: 13px 14px; min-height: 44px; }
    .option .opt-text { font-size: 0.9rem; }
    .opt-label { width: 26px; height: 26px; min-width: 26px; }

    /* Nút xếp full-width theo cột, nút "Câu tiếp" lên trên cho dễ bấm 1 tay */
    .card-actions { flex-direction: column-reverse; }
    .card-actions .btn { width: 100%; margin-left: 0 !important; padding: 13px 16px; min-height: 46px; }

    .result-circle { width: 120px; height: 120px; border-width: 5px; margin-bottom: 22px; }
    .result-score { font-size: 2.2rem; }
    .result-stats { gap: 10px; margin-bottom: 28px; }
    .result-actions { flex-direction: column-reverse; }
    .result-actions button { width: 100%; min-height: 46px; }
  }

  /* ===== MÀN HÌNH RẤT NHỎ (≤380px) ===== */
  @media (max-width: 380px) {
    #home h1 { font-size: 1.35rem; }
    .question-text { font-size: 0.88rem; }
    .option .opt-text { font-size: 0.85rem; }
    .result-stats { grid-template-columns: 1fr 1fr; }
    .stat-box:nth-child(3) { grid-column: span 2; }
  }

  /* Vô hiệu hover trên thiết bị cảm ứng, dùng :active để phản hồi rõ khi chạm */
  @media (hover: none) {
    .exam-card:hover, .option:hover:not(.disabled), .back-btn:hover,
    .btn-hint:hover, .btn-next:hover, .btn-restart:hover, .btn-home:hover { transform: none; }
    .exam-card:active { border-color: #f0c040; transform: scale(0.98); }
    .option:active:not(.disabled) { border-color: #4a9eff; background: #132034; }
    .btn:active, .btn-restart:active, .btn-home:active { filter: brightness(0.92); }
  }
</style>
</head>
<body>

<!-- HOME -->
<div id="home">
  <h1>📚 Quiz Trắc Nghiệm</h1>
  <p>Nhập Môn Web Và Ứng Dụng — Chọn đề để bắt đầu</p>
  <div class="exam-grid" id="examGrid"></div>
</div>

<!-- QUIZ -->
<div id="quiz">
  <div class="quiz-header">
    <button class="back-btn" onclick="goHome()">← Về trang chủ</button>
    <span class="quiz-title" id="quizTitle"></span>
    <span class="quiz-meta" id="quizMeta"></span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div id="questionContainer"></div>
</div>

<!-- RESULT -->
<div id="result">
  <div class="result-circle">
    <span class="result-score" id="resScore"></span>
    <span class="result-label">điểm</span>
  </div>
  <div class="result-title" id="resTitle"></div>
  <div class="result-sub" id="resSub"></div>
  <div class="result-stats">
    <div class="stat-box"><div class="num" id="resCorrect" style="color:#22c55e"></div><div class="lbl">Đúng</div></div>
    <div class="stat-box"><div class="num" id="resWrong" style="color:#ef4444"></div><div class="lbl">Sai</div></div>
    <div class="stat-box"><div class="num" id="resTotal"></div><div class="lbl">Tổng câu</div></div>
  </div>
  <div class="result-actions">
    <button class="btn-home" onclick="goHome()">🏠 Trang chủ</button>
    <button class="btn-restart" id="restartBtn" onclick="restart()">🔄 Chơi lại</button>
  </div>
</div>

<script>
const EXAMS = [
  {

      { q: "Đoạn mã <code>ab&lt;c&gt;d&lt;/c&gt;</code> xuất ra trên trình duyệt là gì?", opts: ["ab<c>d</c>", "abd", "abcd", "Lỗi"], ans: 1 },
      { q: "Đoạn mã <code>X&lt;sup&gt;2&lt;/sup&gt;</code> xuất ra trình duyệt là gì?", opts: ["X₂", "X2", "X²", "X<sup>2</sup>"], ans: 2 },
      { q: "Trong <code>&lt;table&gt;</code> thuộc tính màu nền là?", opts: ["background", "bordercolor", "bgcolor", "background-color"], ans: 2 },
      { q: "Để mở liên kết trong một cửa sổ mới sử dụng thuộc tính?", opts: ['target="_top"', 'target="_self"', 'target="_blank"', 'target="_parent"'], ans: 2 },
      { q: "Tag nào dùng để tạo tiêu đề kích thước nhỏ nhất?", opts: ["<h1>", "<h6>", "<heading>", "<header>"], ans: 1 },

      { q: "Thuộc tính nào dùng để tạo gợi ý nhập liệu cho 1 text field?", opts: ["recommend", "hint", "placeholder", 'hint="Nhập số"'], ans: 2 },
      { q: 'Thêm thuộc tính nào vào <code>&lt;input type="text"&gt;</code> để không cho người dùng thay đổi giá trị nhưng vẫn gửi dữ liệu lên server?', opts: ['enable="false"', "readonly", "locked", 'change-value="no"'], ans: 1 },
      { q: 'Thẻ nào dùng để tạo liên kết trong trang1.html đến vị trí pos1 trong trang2.html (cùng thư mục)?', opts: ['<a href="pos1&trang2.html"></a>', '<a href="trang2.html&pos1"></a>', '<a href="trang2.html#pos1"></a>', '<a href="trang2.html@pos1"></a>'], ans: 2 },

const LABELS = ['A', 'B', 'C', 'D', 'E'];
let currentExam = 0;
let currentQ = 0;
let score = 0;
let answered = [];
let hintUsed = [];
let selectedAnswer = null;

function goHome() {
  document.getElementById('home').style.display = 'flex';
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'none';
}

function startExam(idx) {
  currentExam = idx;
  currentQ = 0;
  score = 0;
  answered = new Array(EXAMS[idx].questions.length).fill(null);
  hintUsed = new Array(EXAMS[idx].questions.length).fill(false);
  selectedAnswer = null;
  document.getElementById('home').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  document.getElementById('quizTitle').textContent = EXAMS[idx].title + (EXAMS[idx].year ? ' (' + EXAMS[idx].year + ')' : '');
  renderQuestion();
}

function restart() {
  startExam(currentExam);
}

function renderQuestion() {
  const exam = EXAMS[currentExam];
  const total = exam.questions.length;
  const q = exam.questions[currentQ];
  document.getElementById('quizMeta').textContent = `Câu ${currentQ + 1} / ${total}`;
  document.getElementById('progressFill').style.width = ((currentQ / total) * 100) + '%';

  const wasDone = answered[currentQ] !== null;
  const wasHint = hintUsed[currentQ];

  let optsHtml = '';
  q.opts.forEach((opt, i) => {
    let cls = 'option';
    if (wasDone) {
      cls += ' disabled';
      if (i === q.ans) cls += ' correct';
      else if (i === answered[currentQ] && i !== q.ans) cls += ' wrong';
    } else if (wasHint && i === q.ans) {
      cls += ' hint-correct';
    } else if (selectedAnswer === i) {
      cls += ' selected';
    }
    optsHtml += `<div class="${cls}" onclick="selectOpt(${i})">
      <span class="opt-label">${LABELS[i]}</span>
      <span class="opt-text">${opt}</span>
    </div>`;
  });

  let feedbackHtml = '';
  if (wasDone) {
    if (answered[currentQ] === q.ans) {
      feedbackHtml = '<div class="feedback correct-msg">✅ Chính xác!</div>';
    } else {
      feedbackHtml = `<div class="feedback wrong-msg">❌ Sai! Đáp án đúng: <b>${LABELS[q.ans]}. ${q.opts[q.ans]}</b></div>`;
    }
  }

  document.getElementById('questionContainer').innerHTML = `
    <div class="question-card">
      <div class="question-num">Câu ${currentQ + 1}</div>
      <div class="question-text">${q.q}</div>
      <div class="options">${optsHtml}</div>
      ${feedbackHtml}
      <div class="card-actions">
        ${!wasDone ? `<button class="btn btn-hint" onclick="showHint()" ${wasHint ? 'disabled style="opacity:0.5"' : ''}>💡 Gợi ý</button>` : ''}
        <button class="btn btn-next" id="nextBtn" onclick="nextQuestion()" ${(!wasDone && selectedAnswer === null) ? 'disabled' : ''}>
          ${currentQ < EXAMS[currentExam].questions.length - 1 ? 'Câu tiếp →' : 'Xem kết quả 🏁'}
        </button>
      </div>
    </div>`;
}

function selectOpt(i) {
  if (answered[currentQ] !== null) return;
  selectedAnswer = i;
  renderQuestion();
  // confirm answer
  answered[currentQ] = i;
  const exam = EXAMS[currentExam];
  if (i === exam.questions[currentQ].ans) score++;
  renderQuestion();
}

function showHint() {
  if (answered[currentQ] !== null) return;
  hintUsed[currentQ] = true;
  selectedAnswer = null;
  renderQuestion();
}

function nextQuestion() {
  if (answered[currentQ] === null && selectedAnswer === null) return;
  const exam = EXAMS[currentExam];
  if (currentQ < exam.questions.length - 1) {
    currentQ++;
    selectedAnswer = answered[currentQ] !== null ? answered[currentQ] : null;
    renderQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  const total = EXAMS[currentExam].questions.length;
  const pct = Math.round((score / total) * 100);
  document.getElementById('resScore').textContent = pct + '%';
  const correct = score;
  const wrong = total - score;
  document.getElementById('resCorrect').textContent = correct;
  document.getElementById('resWrong').textContent = wrong;
  document.getElementById('resTotal').textContent = total;
  let title, sub;
  if (pct >= 90) { title = '🏆 Xuất sắc!'; sub = 'Bạn nắm rất vững kiến thức!'; }
  else if (pct >= 70) { title = '🎉 Tốt lắm!'; sub = 'Kết quả khá ổn, hãy ôn thêm phần sai!'; }
  else if (pct >= 50) { title = '📖 Cần cố gắng hơn'; sub = 'Ôn lại các phần còn yếu nhé!'; }
  else { title = '💪 Cần luyện tập thêm'; sub = 'Đừng nản, thử lại và ôn kỹ hơn!'; }
  document.getElementById('resTitle').textContent = title;
  document.getElementById('resSub').textContent = sub;
}

// Build home cards
const grid = document.getElementById('examGrid');
EXAMS.forEach((e, i) => {
  const card = document.createElement('div');
  card.className = 'exam-card';
  card.innerHTML = `<div class="icon">${e.icon}</div><h2>${e.title}</h2><span>${e.questions.length} câu hỏi${e.year ? ' · ' + e.year : ''}</span>`;
  card.onclick = () => startExam(i);
  grid.appendChild(card);
});
</script>
